name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --release

    - name: Run Rust Tests
      run: cargo test --release

    - name: Run SOM TestHarness
      run: cargo run --release -- SOM/TestSuite/TestHarness.som

    - name: Run all tests/Test*.som scripts
      run: |
        for f in tests/Test*.som; do
          if [ -f "$f" ]; then
            name=$(basename "$f" .som)
            echo "::group::Running $name"
            cargo run -q --release -- -c tests "$name"
            echo "::endgroup::"
          fi
        done
